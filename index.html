<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="조만제❤️유지혜의 결혼식에 초대합니다." />
  <meta property="og:description" content="2026년 7월 18일 토요일 오후 12시 20분, 주안 CN웨딩홀" />
  <meta property="og:image" content="https://raw.githubusercontent.com/josminum-dotcom/my-wedding/main/images/og/1.jpg" />
  <meta property="og:url" content="https://josminum-dotcom.github.io/my-wedding/" />

  <title id="page-title">모바일 청첩장</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@200;300;400;500;600&family=Great+Vibes&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <button class="bgm-btn" id="btn-bgm" aria-label="음악 재생/일시정지">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 18V5l12-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="18" cy="16" r="3"></circle>
    </svg>
  </button>

  <div class="curtain" id="curtain">
    <div class="curtain__left"></div>
    <div class="curtain__right"></div>
    <div class="curtain__content">
      <p class="curtain__names" id="curtain-names"></p>
      <p class="curtain__msg">결혼합니다</p>
      <button class="curtain__btn" id="curtain-open">초대장 열기</button>
    </div>
  </div>

  <canvas id="petals-canvas"></canvas>

  <div class="toast" id="toast"></div>

  <main class="invitation">

    <section class="section hero" id="hero">
      <div class="floral-frame">
        <div class="hero__photo-wrap">
          <img id="hero-img" src="" alt="웨딩 사진" loading="lazy" />
        </div>
      </div>
      <div class="hero__info anim-target">
        <p class="hero__label script-font">Wedding Day</p>
        <h1 class="hero__names" id="hero-names"></h1>
        <p class="hero__date" id="hero-date"></p>
        <p class="hero__venue" id="hero-venue"></p>
      </div>
      <div class="countdown anim-target" id="countdown">
        <div class="countdown__item">
          <span class="countdown__num" id="cd-days">0</span>
          <span class="countdown__label">DAYS</span>
        </div>
        <div class="countdown__item">
          <span class="countdown__num" id="cd-hours">0</span>
          <span class="countdown__label">HOURS</span>
        </div>
        <div class="countdown__item">
          <span class="countdown__num" id="cd-minutes">0</span>
          <span class="countdown__label">MIN</span>
        </div>
        <div class="countdown__item">
          <span class="countdown__num" id="cd-seconds">0</span>
          <span class="countdown__label">SEC</span>
        </div>
      </div>
      <div class="floral-divider"></div>
    </section>

    <section class="section greeting" id="greeting">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font" id="greeting-title"></h2>
        <p class="greeting__text" id="greeting-text"></p>
        <div class="greeting__parents" id="greeting-parents"></div>
      </div>
      <div class="floral-divider"></div>
    </section>

    <section class="section calendar-section" id="calendar-section">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Wedding Day</h2>
        <div class="calendar" id="calendar"></div>
        <div class="calendar-buttons">
          <button class="btn btn--outline" id="btn-google-cal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Google 캘린더
          </button>
          <button class="btn btn--outline" id="btn-ics-cal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Apple 캘린더
          </button>
        </div>
      </div>
      <div class="floral-divider"></div>
    </section>

    <section class="section story" id="story">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font" id="story-title"></h2>
        <p class="story__text" id="story-text"></p>
      </div>
      <div class="story__images" id="story-images"></div>
      <div class="floral-divider"></div>
    </section>

    <section class="section gallery" id="gallery">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Gallery</h2>
      </div>
      <div class="gallery__grid" id="gallery-grid"></div>
      <div class="floral-divider"></div>
    </section>

    <section class="section location" id="location">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Location</h2>
        <p class="location__venue" id="loc-venue"></p>
        <p class="location__hall" id="loc-hall"></p>
        <p class="location__address" id="loc-address"></p>
        <p class="location__tel" id="loc-tel"></p>
        <div class="location__map-wrap">
          <img id="loc-map-img" src="" alt="오시는 길" loading="lazy" />
        </div>
        <div class="location__buttons">
          <button class="btn btn--rose" id="btn-copy-address">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            주소 복사
          </button>
          <a class="btn btn--outline" id="btn-kakao-map" href="" target="_blank" rel="noopener">
            카카오맵
          </a>
          <a class="btn btn--outline" id="btn-naver-map" href="" target="_blank" rel="noopener">
            네이버 지도
          </a>
        </div>
      </div>
      <div class="floral-divider"></div>
    </section>

    <section class="section account" id="account">
      <div class="section__inner anim-target">
        <h2 class="section__title script-font">Celebration</h2>
        <p class="account__subtitle">축하의 마음을 전해주세요</p>

        <div class="accordion" id="acc-groom">
          <button class="accordion__toggle" data-target="acc-groom-body">
            <span>신랑측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__body" id="acc-groom-body"></div>
        </div>

        <div class="accordion" id="acc-bride">
          <button class="accordion__toggle" data-target="acc-bride-body">
            <span>신부측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__body" id="acc-bride-body"></div>
        </div>
      </div>
    </section>

    <section class="section share" id="share">
      <div class="section__inner anim-target">
        <h2 class="share__title script-font">Share</h2>
        <div class="share__buttons">
          <button class="btn btn--kakao" id="btn-kakao-share">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-5.523 0-10 3.518-10 7.857 0 2.766 1.83 5.176 4.606 6.554-.253.94-1.026 3.86-.975 3.968.044.095.344.09.435.05 1.157-.503 4.29-2.906 4.29-2.906.53.076 1.08.118 1.644.118 5.523 0 10-3.518 10-7.857C22 6.518 17.523 3 12 3z"/></svg>
            카카오톡으로 공유하기
          </button>
          <button class="btn btn--link" id="btn-link-share">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            URL 링크 복사하기
          </button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p class="footer__text script-font">Thank you</p>
    </footer>

  </main>

  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="viewer__backdrop"></div>
    <button class="viewer__close" id="viewer-close" aria-label="닫기">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="viewer__counter" id="viewer-counter"></div>
    <div class="viewer__track" id="viewer-track"></div>
    <button class="viewer__nav viewer__nav--prev" id="viewer-prev" aria-label="이전">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="viewer__nav viewer__nav--next" id="viewer-next" aria-label="다음">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
  </audio>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
